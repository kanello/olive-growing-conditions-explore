model:
  architecture: unet
  encoder_name: resnet34
  encoder_weights: imagenet
  in_channels: 12
  num_classes: 8
  lr: 1.0e-4

data:
  imagery_dir: data/processed/imagery
  labels_dir: data/processed/labels
  patch_size: 256
  batch_size: 16
  num_workers: 4
  train_val_split: 0.85

trainer:
  max_epochs: 100
  accelerator: auto
  precision: "16-mixed"
  log_every_n_steps: 10
  callbacks:
    early_stopping:
      monitor: val/loss
      patience: 15
      mode: min
    checkpoint:
      monitor: val/miou
      mode: max
      filename: "epoch={epoch}-miou={val/miou:.4f}"
      save_top_k: 3

mlflow:
  experiment_name: sentinel-crop-seg
  run_name: baseline-resnet34
